{% set name = "radiospectra" %}
{% set version = "0.7.0" %}
{% set sha256 = "bdcc2ad3fefb1a194c27a9479d3fb62b84c1894e668a231f807d4c31d198ec6c" %}
{% set python_min = "3.12" %} 

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - sunpy >=7.0.0
    - numpy
    - matplotlib-base
    - scipy
    - cdflib >=0.3.20

test:
  requires:
    - python {{ python_min }}
  imports:
    - radiospectra
    - radiospectra.net
    - radiospectra.spectrogram

about:
  home: http://sunpy.org
  license: BSD-2-Clause
  license_family: BSD
  license_file: LICENSE.rst
  summary: Provide support for some type of radio spectra on solar physics
  doc_url: https://radiospectra.readthedocs.io/
  dev_url: https://github.com/sunpy/radiospectra

extra:
  recipe-maintainers:
    - wtbarnes
    - cadair
    - samaloney
